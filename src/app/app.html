<div class="dashboard-container p-3 min-h-screen">

  <!-- KPI STRIP -->
  <div class="grid mb-2">

    @for (kpi of kpis; track kpi.title) {
    <div class="col-12 md:col-6 xl:col-2 ">
      <app-kpi-card [title]="kpi.title" [value]="kpi.value" [color]="kpi.color" [icon]="kpi.icon">
      </app-kpi-card>
    </div>
    }



  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <div class="col-12 xl:col-9 border-round-lg overflow-hidden border-1 map">
      <app-live-map-page></app-live-map-page>
    </div>

    <!-- ANALYTICS -->
    <!-- <div class="col-12 xl:col-8">

      <div class="panel threads-panel">

        <div class="panel-header mb-4">

          <div>
            <div class="panel-title">
              Fleet Analytics
            </div>
            <div class="panel-subtitle">
              Real-time fleet insights
            </div>
          </div>

          <button pButton type="button" icon="pi pi-refresh" class="p-button-text p-button-rounded text-gray-300">
          </button>

        </div>

        <app-analytics></app-analytics>

      </div>

    </div> -->

    <!-- ALERT FEED -->
    <div class="col-12 xl:col-3">

      <div class="panel threads-panel">

        @if (pagination.totalRecords) {
          <p-scrollPanel [style]="{ width: '100%', height: '300px' }">
            <div class="flex flex-column gap-2">
    
              @for (alert of alerts; track alert.id) {
    
              <div class="feed-item">
    
                <div class="feed-icon" [ngClass]="{
                  'danger': alert.type === 'danger',
                  'warning': alert.type === 'warning',
                  'info': alert.type === 'info'
                }">
    
                  <i [class]="alert.icon"></i>
    
                </div>
    
                <div class="flex-1 min-w-0">
    
                  <div class="feed-title">
                    {{ alert.title }}
                  </div>
    
                  <div class="feed-subtitle">
                    {{ alert.message }}
                  </div>
    
                </div>
    
                <div class="flex-column">
                  <div class="feed-time">
                    {{ alert.time }}
                  </div>
  
                  <div class="text-sm">
                    {{alert.vehicleId}}
                  </div>
                </div>
    
              </div>
    
              }
    
            </div>
          </p-scrollPanel>

       <div class="paginator-container">
        <p-paginator
          [rows]="pagination.rows"
          [first]="pagination.first"
          [totalRecords]="pagination.totalRecords"
          [rowsPerPageOptions]="[5, 10, 20]"
          (onPageChange)="onPageChange($event)">
        </p-paginator>
      </div>
        } @else {
        <div class="flex flex-column align-items-center justify-content-center py-6 text-center">
          <i class="pi pi-bell text-5xl text-400 mb-3"></i>

          <h4 class="m-0 mb-2">No Alerts Available</h4>

          <p class="text-500 m-0">
            There are currently no alerts to display.
          </p>
        </div>
        }

      </div>

    </div>

  </div>

  <div class="grid">
    <div class="col-12 ">
      <div class="panel threads-panel analytics">

        <app-analytics></app-analytics>

      </div>

    </div>

  </div>

</div>
